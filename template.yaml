AWSTemplateFormatVersion: '2010-09-09'
Description: "Bedrock Cost Guard - usage monitor + daily reconciler + cost estimation (serverless, one-click deploy)"

Parameters:
  GitHubOwner:
    Type: String
    Default: huizi-2003
    Description: GitHub repository owner.
  GitHubRepo:
    Type: String
    Default: sample-cost-guard-for-amazon-bedrock
    Description: GitHub repository name.
  Branch:
    Type: String
    Default: main
    Description: Git branch to pull source code from.
  Version:
    Type: String
    Default: '1'
    Description: Change this value on each deploy to trigger code re-fetch (use timestamp e.g. 20260706).
  AllowedCidrs:
    Type: CommaDelimitedList
    Default: 127.0.0.1/32
    Description: >
      Comma-separated CIDRs allowed to access the Web Console
      (e.g. 1.2.3.4/32,5.6.7.0/24). Default is closed.

Resources:
  # ===== S3 bucket for Lambda code (auto-created) =====
  CodeBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ===== Bootstrap: download source zip from GitHub into CodeBucket =====
  CodeFetcherRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeFetcherPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                Resource: !Sub "arn:${AWS::Partition}:s3:::${CodeBucket}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketVersions
                Resource: !Sub "arn:${AWS::Partition}:s3:::${CodeBucket}"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"

  CodeFetcherFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-code-fetcher"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CodeFetcherRole.Arn
      Timeout: 120
      MemorySize: 256
      Code:
        ZipFile: |
          import urllib.request, boto3, zipfile, io, subprocess, tempfile, os, json
          KEEP = ('common/', 'monitor/', 'reconciler/', 'web/')
          def _send(event, context, status, data):
              body = json.dumps({
                  'Status': status,
                  'Reason': 'See CloudWatch Log Stream: ' + context.log_stream_name,
                  'PhysicalResourceId': event.get('PhysicalResourceId') or context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data,
              }).encode('utf-8')
              req = urllib.request.Request(event['ResponseURL'], data=body, method='PUT',
                                           headers={'content-type': '', 'content-length': str(len(body))})
              urllib.request.urlopen(req, timeout=30)
          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      # 删栈时清空 CodeBucket，否则非空桶会导致 DELETE_FAILED。
                      # best-effort：清空失败也不阻塞栈删除。
                      try:
                          b = event.get('ResourceProperties', {}).get('Bucket')
                          if b:
                              s3 = boto3.client('s3')
                              pg = s3.get_paginator('list_object_versions')
                              for page in pg.paginate(Bucket=b):
                                  objs = [{'Key': o['Key'], 'VersionId': o['VersionId']}
                                          for o in page.get('Versions', [])]
                                  objs += [{'Key': o['Key'], 'VersionId': o['VersionId']}
                                           for o in page.get('DeleteMarkers', [])]
                                  if objs:
                                      s3.delete_objects(Bucket=b, Delete={'Objects': objs})
                      except Exception:
                          pass
                      _send(event, context, 'SUCCESS', {})
                      return
                  p = event['ResourceProperties']
                  req = urllib.request.Request(p['SourceUrl'], headers={'User-Agent': 'cfn-bootstrap'})
                  raw = urllib.request.urlopen(req, timeout=120).read()
                  src = zipfile.ZipFile(io.BytesIO(raw))

                  # Build lambda.zip (monitor + reconciler + common)
                  buf = io.BytesIO()
                  with zipfile.ZipFile(buf, 'w', zipfile.ZIP_DEFLATED) as out:
                      for name in src.namelist():
                          if name.endswith('/'):
                              continue
                          parts = name.split('/', 1)
                          inner = parts[1] if len(parts) > 1 else parts[0]
                          if inner and inner.startswith(('common/', 'monitor/', 'reconciler/')):
                              out.writestr(inner, src.read(name))
                  buf.seek(0)
                  s3 = boto3.client('s3')
                  resp1 = s3.put_object(Bucket=p['Bucket'], Key='lambda.zip', Body=buf.read())

                  # Build web.zip (web/ + common/ + mangum dependency)
                  tmpdir = tempfile.mkdtemp()
                  # Extract web/ and common/ to tmpdir
                  for name in src.namelist():
                      if name.endswith('/'):
                          continue
                      parts = name.split('/', 1)
                      inner = parts[1] if len(parts) > 1 else parts[0]
                      if inner and inner.startswith(('web/', 'common/')):
                          dest = os.path.join(tmpdir, inner)
                          os.makedirs(os.path.dirname(dest), exist_ok=True)
                          with open(dest, 'wb') as f:
                              f.write(src.read(name))
                  # Install web dependencies from requirements.txt (flask/mangum/boto3),
                  # 回退到显式安装 flask+mangum，避免缺依赖导致 500。
                  req_file = os.path.join(tmpdir, 'web', 'requirements.txt')
                  if os.path.exists(req_file):
                      subprocess.check_call(['pip', 'install', '-r', req_file, '-t', tmpdir, '--quiet'])
                  else:
                      subprocess.check_call(['pip', 'install', 'fastapi', 'mangum', '-t', tmpdir, '--quiet'])
                  # Create web.zip
                  buf2 = io.BytesIO()
                  with zipfile.ZipFile(buf2, 'w', zipfile.ZIP_DEFLATED) as out:
                      for root, dirs, files in os.walk(tmpdir):
                          for f in files:
                              full = os.path.join(root, f)
                              arcname = os.path.relpath(full, tmpdir)
                              out.write(full, arcname)
                  buf2.seek(0)
                  resp2 = s3.put_object(Bucket=p['Bucket'], Key='web.zip', Body=buf2.read())

                  _send(event, context, 'SUCCESS', {
                      'LambdaVersionId': resp1.get('VersionId', 'null'),
                      'WebVersionId': resp2.get('VersionId', 'null'),
                  })
              except Exception as e:
                  _send(event, context, 'FAILED', {'Error': str(e)})

  CodeObject:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt CodeFetcherFunction.Arn
      SourceUrl: !Sub "https://github.com/${GitHubOwner}/${GitHubRepo}/archive/refs/heads/${Branch}.zip"
      Bucket: !Ref CodeBucket
      Key: lambda.zip
      Version: !Ref Version

  # ===== DynamoDB =====
  ConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: bedrock-cost-guard
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expire_at
        Enabled: true

  # ===== Lambda IAM Role (shared by monitor + reconciler) =====
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockLiteGuardLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                Resource: '*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:DeleteItem   # reconciler 幂等清理旧 per-model 记录需要
                Resource: !GetAtt ConfigTable.Arn
              - Effect: Allow
                Action:
                  - ce:GetCostAndUsage
                Resource: '*'
              - Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"

  # ===== Lambda: Monitor =====
  MonitorFunction:
    Type: AWS::Lambda::Function
    DependsOn: CodeObject
    Properties:
      FunctionName: !Sub "${AWS::StackName}-monitor"
      Runtime: python3.12
      Handler: monitor/handler.handler
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: lambda.zip
        S3ObjectVersion: !GetAtt CodeObject.LambdaVersionId
      Role: !GetAtt LambdaRole.Arn
      Timeout: 180
      MemorySize: 512
      Environment:
        Variables:
          DDB_TABLE: !Ref ConfigTable

  # ===== Lambda: Reconciler =====
  ReconcilerFunction:
    Type: AWS::Lambda::Function
    DependsOn: CodeObject
    Properties:
      FunctionName: !Sub "${AWS::StackName}-reconciler"
      Runtime: python3.12
      Handler: reconciler/handler.handler
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: lambda.zip
        S3ObjectVersion: !GetAtt CodeObject.LambdaVersionId
      Role: !GetAtt LambdaRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          DDB_TABLE: !Ref ConfigTable

  # ===== Lambda: Web Console =====
  WebLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockLiteGuardWebPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:DeleteItem
                Resource: !GetAtt ConfigTable.Arn
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-reconciler"
                  - !Sub "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-web"
              - Effect: Allow
                Action:
                  - iam:ListUsers
                  - iam:ListRoles
                  - iam:ListGroups
                  - iam:ListAttachedUserPolicies
                  - iam:ListAttachedRolePolicies
                  - iam:ListAttachedGroupPolicies
                  - iam:ListUserPolicies
                  - iam:ListRolePolicies
                  - iam:ListGroupPolicies
                  - iam:ListGroupsForUser
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:GetUserPolicy
                  - iam:GetRolePolicy
                  - iam:GetGroupPolicy
                  - iam:GetGroup
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:*"

  WebFunction:
    Type: AWS::Lambda::Function
    DependsOn: CodeObject
    Properties:
      FunctionName: !Sub "${AWS::StackName}-web"
      Runtime: python3.12
      Handler: web/app.handler
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: web.zip
        S3ObjectVersion: !GetAtt CodeObject.WebVersionId
      Role: !GetAtt WebLambdaRole.Arn
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          DDB_TABLE: !Ref ConfigTable
          RECONCILER_FUNCTION_NAME: !Sub "${AWS::StackName}-reconciler"

  # ===== EventBridge Schedules =====
  MonitorSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-monitor-schedule"
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Targets:
        - Id: MonitorLambda
          Arn: !GetAtt MonitorFunction.Arn

  ReconcilerSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${AWS::StackName}-reconciler-schedule"
      ScheduleExpression: cron(0 1 * * ? *)
      State: ENABLED
      Targets:
        - Id: ReconcilerLambda
          Arn: !GetAtt ReconcilerFunction.Arn

  MonitorPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MonitorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt MonitorSchedule.Arn

  ReconcilerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ReconcilerFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ReconcilerSchedule.Arn

  # ===== API Gateway (REST API) =====
  WebApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${AWS::StackName}-web"
      Description: Bedrock Cost Guard Web Console
      EndpointConfiguration:
        Types:
          - REGIONAL
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: execute-api:Invoke
            Resource: execute-api:/*
          - Effect: Deny
            Principal: '*'
            Action: execute-api:Invoke
            Resource: execute-api:/*
            Condition:
              NotIpAddress:
                aws:SourceIp: !Ref AllowedCidrs

  WebApiRootMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref WebApi
      ResourceId: !GetAtt WebApi.RootResourceId
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebFunction.Arn}/invocations"

  WebApiProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref WebApi
      ParentId: !GetAtt WebApi.RootResourceId
      PathPart: '{proxy+}'

  WebApiProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref WebApi
      ResourceId: !Ref WebApiProxyResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebFunction.Arn}/invocations"

  # ===== Custom Resource: 强制在 AllowedCidrs/Version 变化时重新部署 API =====
  ApiDeploymentTriggerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ApiGatewayDeployment
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - apigateway:POST
                  - apigateway:GET
                Resource: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}::/restapis/${WebApi}/deployments*"

  ApiDeploymentTriggerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-api-deployment-trigger"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ApiDeploymentTriggerRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import boto3, json, urllib.request
          apigw = boto3.client('apigateway')
          def send_response(event, context, status, data=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': f"See CloudWatch Log Stream: {context.log_stream_name}",
                  'PhysicalResourceId': data.get('id') if data else event.get('PhysicalResourceId', context.log_stream_name),
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data or {}
              })
              req = urllib.request.Request(event['ResponseURL'], data=body.encode(), method='PUT')
              urllib.request.urlopen(req)
          def handler(event, context):
              print(json.dumps(event))
              try:
                  req_type = event['RequestType']
                  props = event['ResourceProperties']
                  api_id = props['RestApiId']
                  description = props.get('Description', 'CloudFormation deployment')

                  if req_type == 'Delete':
                      send_response(event, context, 'SUCCESS', {'id': event['PhysicalResourceId']})
                      return

                  # Create/Update 都创建新的 Deployment（不指定 stageName，由 CFn Stage 资源管理）
                  resp = apigw.create_deployment(restApiId=api_id, description=description)
                  deployment_id = resp['id']
                  print(f"Created deployment {deployment_id}")
                  send_response(event, context, 'SUCCESS', {'id': deployment_id, 'DeploymentId': deployment_id})
              except Exception as e:
                  print(f"Error: {e}")
                  send_response(event, context, 'FAILED', {'error': str(e)})

  WebApiDeployment:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - WebApiRootMethod
      - WebApiProxyMethod
    Properties:
      ServiceToken: !GetAtt ApiDeploymentTriggerFunction.Arn
      RestApiId: !Ref WebApi
      # Description 包含 AllowedCidrs + Version，任一变化都触发重新创建
      Description: !Sub
        - "CIDRs=[${Cidrs}] v${Version}"
        - Cidrs: !Join [',', !Ref AllowedCidrs]

  WebApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref WebApi
      DeploymentId: !GetAtt WebApiDeployment.DeploymentId
      StageName: prod

  WebApiFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WebFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${WebApi}/*"

Outputs:
  MonitorFunctionName:
    Value: !Ref MonitorFunction
  ReconcilerFunctionName:
    Value: !Ref ReconcilerFunction
  ConfigTableName:
    Value: !Ref ConfigTable
  CodeBucketName:
    Value: !Ref CodeBucket
  WebConsoleUrl:
    Value: !Sub "https://${WebApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
    Description: Web Console URL
